name: Daily Telecom News Collection

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 23:00 UTC = 다음날 08:00 KST
  workflow_dispatch:         # GitHub 웹에서 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # data/articles.json 커밋 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/collect.py

      - name: 데이터 커밋 및 푸시
        run: |
          git config user.name  "Telecom Watch Bot"
          git config user.email "bot@telecom-watch.local"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "data: daily update $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
