<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통신산업 동향 모니터 — Telecom Watch</title>
<style>
  :root {
    --purple-900: #1A1145;
    --purple-800: #26215C;
    --purple-700: #3C3489;
    --purple-600: #534AB7;
    --purple-500: #7F77DD;
    --purple-400: #9B94E8;
    --purple-300: #AFA9EC;
    --purple-200: #CECBF6;
    --purple-100: #EEEDFE;
    --blue-600: #185FA5;
    --gray-50: #F7F6F5;
    --gray-100: #EFEFED;
    --gray-200: #D3D1C7;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.1);
    --border-light: rgba(0,0,0,0.06);
    --bg: #F4F3F1;
    --surface: #FFFFFF;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font-scale: 1;
  }
  body.dark {
    --purple-100: #2A255A;
    --purple-200: #3A3580;
    --purple-300: #6B65C8;
    --purple-600: #AFA9EC;
    --purple-700: #9B94E8;
    --text-primary: #F0EFF0;
    --text-secondary: #B8B7B3;
    --text-tertiary: #888780;
    --border: rgba(255,255,255,0.12);
    --border-light: rgba(255,255,255,0.06);
    --bg: #12111A;
    --surface: #1E1C2E;
    --gray-50: #1E1C2E;
    --gray-100: #2A2840;
    --gray-200: #3A3850;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif; background: var(--bg); color: var(--text-primary); font-size: calc(14px * var(--font-scale)); line-height: 1.7; transition: background 0.2s, color 0.2s; }

  /* ── HEADER ── */
  .site-header { background: var(--purple-700); padding: 0 14px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 200; gap: 8px; }
  .site-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .site-logo-icon { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
  .site-logo-icon svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
  .site-logo-text { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .site-logo-sub { color: var(--purple-300); font-size: 11px; letter-spacing: 0.05em; }
  .header-nav { display: flex; align-items: center; gap: 2px; flex: 1; justify-content: center; }
  .nav-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); font-size: 13px; padding: 6px 11px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-btn.active { background: rgba(255,255,255,0.18); color: #fff; }
  .header-tools { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .tool-btn { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.85); font-size: 12px; padding: 5px 10px; border-radius: 16px; cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .tool-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .tool-btn.on { background: #fff; color: var(--purple-700); }
  .font-ctrl { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 16px; }
  .font-btn { background: transparent; border: none; color: rgba(255,255,255,0.8); cursor: pointer; padding: 4px 8px; font-size: 12px; font-family: inherit; border-radius: 12px; transition: background 0.12s; }
  .font-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .summary-toggle { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); font-size: 12px; padding: 5px 11px; border-radius: 20px; cursor: pointer; border: none; font-family: inherit; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
  .summary-toggle:hover { background: rgba(255,255,255,0.22); }
  .summary-toggle.on { background: #fff; color: var(--purple-700); }

  /* ── MAIN GRID ── */
  .main-wrap { max-width: 1280px; margin: 0 auto; padding: 20px 16px 60px; display: grid; grid-template-columns: 176px 1fr 256px; gap: 0 16px; }

  /* ── LEFT NAV ── */
  .left-nav { grid-column: 1; grid-row: 1 / 4; padding-top: 4px; }
  .left-nav-inner { position: sticky; top: 68px; display: flex; flex-direction: column; gap: 6px; max-height: calc(100vh - 80px); overflow-y: auto; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.09em; text-transform: uppercase; padding: 10px 10px 4px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: background 0.12s, color 0.12s; border: none; background: transparent; font-family: inherit; text-align: left; width: 100%; }
  .nav-item:hover { background: rgba(83,74,183,0.08); color: var(--purple-700); }
  .nav-item.active { background: var(--purple-100); color: var(--purple-700); font-weight: 500; border-left: 3px solid var(--purple-600); padding-left: 7px; }
  .nav-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .nav-divider { height: 0.5px; background: var(--border); margin: 4px 0; }
  .nav-count { margin-left: auto; font-size: 11px; color: var(--text-tertiary); }

  /* ── CENTER ── */
  .center-col { grid-column: 2; grid-row: 1 / 4; display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  /* ── BANNER ── */
  .today-banner { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; border-left: 4px solid var(--purple-600); }
  .banner-label { font-size: 10px; color: var(--purple-600); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .banner-headline { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.65; }
  .banner-date { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 0 0 180px; display: flex; align-items: center; gap: 7px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 6px 13px; }
  .search-box svg { width: 13px; height: 13px; stroke: var(--text-tertiary); flex-shrink: 0; fill: none; }
  .search-box input { border: none; outline: none; font-size: 12px; color: var(--text-primary); background: transparent; font-family: inherit; width: 100%; }
  .search-box input::placeholder { color: var(--text-tertiary); }
  .filter-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; }
  .filter-chip:hover { border-color: var(--purple-500); color: var(--purple-600); }
  .filter-chip.active { background: var(--purple-100); border-color: var(--purple-500); color: var(--purple-700); font-weight: 500; }
  .filter-sep { width: 0.5px; height: 16px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
  .sort-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; display: flex; align-items: center; gap: 4px; }
  .sort-btn:hover { border-color: var(--purple-500); color: var(--purple-600); }
  .sort-btn.active { background: var(--purple-100); border-color: var(--purple-500); color: var(--purple-700); font-weight: 500; }

  /* ── FEED ── */
  .feed { display: flex; flex-direction: column; gap: 10px; }

  /* ── SECTION HEAD ── */
  .section-head { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .section-head-line { flex: 1; height: 0.5px; background: var(--border); }
  .section-head-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.09em; text-transform: uppercase; white-space: nowrap; }

  /* ── CARD ── */
  .article-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px 10px; transition: border-color 0.15s, box-shadow 0.15s; cursor: pointer; position: relative; }
  .article-card:hover { border-color: var(--purple-500); box-shadow: 0 2px 8px rgba(83,74,183,0.09); }
  .card-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .tag-topic { background: var(--purple-100); color: var(--purple-700); }
  .tag-domestic { background: #F0FDF4; color: #166534; }
  .tag-us { background: #EFF6FF; color: #1D4ED8; }
  .tag-jp { background: #FFF7ED; color: #9A3412; }
  .tag-eu { background: #F0F4FF; color: #3730A3; }
  .tag-cn { background: #FEF2F2; color: #991B1B; }
  .tag-ai { background: var(--purple-600); color: #fff; font-size: 9px; padding: 2px 7px; }
  body.dark .tag-domestic { background: #1a3a28; color: #4ade80; }
  body.dark .tag-us { background: #1a2a4a; color: #60a5fa; }
  body.dark .tag-jp { background: #3a2010; color: #fb923c; }
  body.dark .tag-eu { background: #1e1a4a; color: #818cf8; }
  body.dark .tag-cn { background: #3a1010; color: #f87171; }
  .importance { display: flex; gap: 1px; margin-left: auto; }
  .star.filled { color: var(--purple-500); font-size: 11px; }
  .star.empty { color: var(--gray-200); font-size: 11px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 5px; line-height: 1.55; }
  .card-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; gap: 6px; flex-wrap: wrap; }
  .card-date { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }
  .card-actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

  /* ── ACTION / SHARE BTNS ── */
  .action-btn, .share-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 12px;
    font-size: 11px; font-family: inherit;
    cursor: pointer; border: 0.5px solid var(--border);
    background: transparent; transition: all 0.12s;
    color: var(--text-tertiary);
  }
  .action-btn:hover, .share-btn:hover { background: var(--gray-100); color: var(--text-secondary); }
  .action-btn svg, .share-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .action-btn.source:hover { background: var(--purple-100); color: var(--purple-700); border-color: var(--purple-300); }
  .action-btn.bookmark.saved { color: var(--purple-600); border-color: var(--purple-400); background: var(--purple-100); }
  .share-btn.kakao:hover { background: #FEE500; color: #3A1D1D; border-color: #E6CF00; }
  .share-btn.telegram:hover { background: #E8F4FD; color: #0088CC; border-color: #9ECFEC; }

  /* ── BOOKMARK DOT ── */
  .bookmark-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple-500); position: absolute; top: 11px; right: 13px; display: none; }
  .article-card.bookmarked .bookmark-dot { display: block; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--purple-800); color: #fff; font-size: 12px; padding: 9px 18px; border-radius: 20px; z-index: 9999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MODAL ── */
  #articleModal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  #articleModal.open { display: flex; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(10,8,30,0.55); backdrop-filter: blur(2px); }
  .modal-box { position: relative; background: var(--surface); border-radius: var(--radius-lg); padding: 28px 28px 24px; max-width: 640px; width: 100%; max-height: 88vh; overflow-y: auto; border: 0.5px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,0.2); z-index: 1; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: var(--gray-100); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: var(--gray-200); }
  .modal-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--text-primary); line-height: 1.5; margin-bottom: 10px; }
  .modal-importance { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
  .modal-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 18px; }
  .modal-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 0.5px solid var(--border); gap: 8px; flex-wrap: wrap; }
  .modal-date { font-size: 12px; color: var(--text-tertiary); }
  .modal-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .modal-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 14px; font-size: 12px; font-family: inherit; cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.12s; text-decoration: none; }
  .modal-btn:hover { background: var(--gray-100); }
  .modal-btn.primary { background: var(--purple-700); color: #fff; border-color: var(--purple-700); }
  .modal-btn.primary:hover { background: var(--purple-600); }
  .modal-btn.kakao:hover { background: #FEE500; color: #3A1D1D; border-color: #E6CF00; }
  .modal-btn.telegram:hover { background: #E8F4FD; color: #0088CC; border-color: #9ECFEC; }

  /* ── RIGHT SIDEBAR ── */
  .sidebar { grid-column: 3; grid-row: 1 / 4; padding-top: 4px; }
  .sidebar-inner { position: sticky; top: 68px; display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 80px); overflow-y: auto; }
  .side-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
  .side-panel-title { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border-light); font-size: 12px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-secondary); }
  .stat-count { font-weight: 500; color: var(--purple-700); }
  .carrier-item { display: flex; align-items: center; gap: 8px; padding: 5px 6px; font-size: 12px; border-bottom: 0.5px solid var(--border-light); cursor: pointer; border-radius: 4px; transition: background 0.1s; }
  .carrier-item:last-child { border-bottom: none; }
  .carrier-item:hover { background: var(--purple-100); }
  .carrier-item.active { background: var(--purple-100); color: var(--purple-700); font-weight: 500; }
  .carrier-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple-500); flex-shrink: 0; }
  .carrier-country { color: var(--text-tertiary); margin-left: auto; font-size: 11px; }
  .archive-dates { display: flex; flex-wrap: wrap; gap: 5px; }
  .date-chip { background: var(--gray-100); border-radius: var(--radius-sm); padding: 4px 9px; font-size: 11px; color: var(--text-secondary); cursor: pointer; border: 0.5px solid transparent; transition: all 0.12s; font-family: inherit; }
  .date-chip:hover { border-color: var(--purple-400); color: var(--purple-700); }
  .date-chip.active { background: var(--purple-100); color: var(--purple-700); border-color: var(--purple-300); font-weight: 500; }
  .export-btns { display: flex; gap: 6px; }
  .export-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 8px; background: var(--gray-100); border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.12s; }
  .export-btn:hover { background: var(--purple-100); color: var(--purple-700); border-color: var(--purple-300); }
  .export-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; }

  /* ── SUMMARY MODE ── */
  body.summary-mode .card-summary { display: none; }
  body.summary-mode .article-card { padding-bottom: 10px; }

  /* ── PRINT ── */
  @media print {
    .site-header, .left-nav, .sidebar, .filter-bar, .card-actions, .today-banner { display: none !important; }
    .main-wrap { display: block !important; padding: 0 !important; }
    .center-col { display: block !important; }
    .article-card { break-inside: avoid; border: 1px solid #ccc !important; margin-bottom: 12px; box-shadow: none !important; cursor: default !important; }
    .card-summary { display: block !important; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) {
    .main-wrap { grid-template-columns: 1fr 220px; }
    .left-nav { display: none; }
    .center-col { grid-column: 1; }
    .sidebar { grid-column: 2; }
    .font-ctrl { display: none; }
  }
  @media (max-width: 680px) {
    .main-wrap { grid-template-columns: 1fr; padding: 10px 10px 40px; }
    .sidebar { display: none; }
    .center-col { grid-column: 1; }
    .site-logo-sub { display: none; }
    .header-nav { justify-content: flex-start; overflow-x: auto; }
    .filter-bar { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .search-box { flex: 0 0 140px; }
    .modal-box { padding: 18px 14px; max-height: 90vh; }
    .card-actions { gap: 3px; }
    .action-btn, .share-btn { padding: 3px 7px; font-size: 10px; }
    .tool-btn span { display: none; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── MODAL ── -->
<div id="articleModal" role="dialog" aria-modal="true">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()" aria-label="닫기">✕</button>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-importance" id="modalImportance"></div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-footer">
      <span class="modal-date" id="modalDate"></span>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
</div>

<header class="site-header">
  <div class="site-logo">
    <div class="site-logo-icon">
      <svg viewBox="0 0 16 16"><polyline points="1,11 4,7 7,9 10,5 13,7 15,4"/></svg>
    </div>
    <div>
      <div class="site-logo-text">Telecom Watch</div>
      <div class="site-logo-sub">통신산업 동향 모니터</div>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="setRegionTab('all',this)">전체</button>
    <button class="nav-btn" onclick="setRegionTab('domestic',this)">국내</button>
    <button class="nav-btn" onclick="setRegionTab('overseas',this)">해외</button>
    <button class="nav-btn" onclick="setRegionTab('bookmarks',this)">북마크</button>
    <button class="nav-btn" onclick="setRegionTab('archive',this)">아카이브</button>
  </nav>
  <div class="header-tools">
    <div class="font-ctrl">
      <button class="font-btn" onclick="changeFont(-1)">A−</button>
      <button class="font-btn" onclick="changeFont(0)">A</button>
      <button class="font-btn" onclick="changeFont(1)">A+</button>
    </div>
    <button class="tool-btn" onclick="refreshData(this)">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 8a6 6 0 1 1-1.5-4M14 2v4h-4"/></svg>
      <span>새로고침</span>
    </button>
    <button class="tool-btn" onclick="window.print()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="1" width="10" height="6" rx="1"/><path d="M3 7H1v7h14V7h-2"/><rect x="4" y="11" width="8" height="3" rx="0.5"/><circle cx="12" cy="9.5" r="0.6" fill="currentColor"/></svg>
      <span>인쇄</span>
    </button>
    <button class="tool-btn" id="darkToggle" onclick="toggleDark()">
      <svg id="darkIcon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M3.5 12.5l.7-.7M11.8 4.2l.7-.7"/><circle cx="8" cy="8" r="3"/></svg>

<script>
/* ═══════ STATE ═══════ */
var ALL = [];
var S = { region:'all', topic:'all', country:'all', chip:'all', date:'all', carrier:'all', sort:false };
var BM = JSON.parse(localStorage.getItem('tw_bm')||'[]');
var DARK = localStorage.getItem('tw_dark')==='1';
var FS_IDX = parseInt(localStorage.getItem('tw_fs')||'1');
var FS = [0.85,1,1.12,1.25];
var MODAL_A = null;

var TOPIC_MAP = {
  '요금·요금제':['요금제'], '최적요금제':['최적요금제'], '리텐션':['리텐션'],
  '결합상품':['결합상품'], '이용약관':['이용약관'], '안면인증':['안면인증']
};
var CM = {
  domestic:{flag:'🇰🇷',label:'국내',cls:'tag-domestic',dot:'var(--purple-500)'},
  us:      {flag:'🇺🇸',label:'미국',cls:'tag-us',      dot:'#1D4ED8'},
  jp:      {flag:'🇯🇵',label:'일본',cls:'tag-jp',      dot:'#9A3412'},
  eu:      {flag:'🇪🇺',label:'유럽',cls:'tag-eu',      dot:'#3730A3'},
  cn:      {flag:'🇨🇳',label:'중국',cls:'tag-cn',      dot:'#991B1B'},
};
var CARRIER_COUNTRY = {
  'SKT':'domestic','KT':'domestic','LG U+':'domestic','알뜰폰':'domestic','방통위':'domestic','과기정통부':'domestic',
  'AT&T':'us','Verizon':'us','T-Mobile':'us',
  'NTT Docomo':'jp','SoftBank':'jp','KDDI':'jp',
  'Deutsche Telekom':'eu','Vodafone':'eu','Orange':'eu',
  'China Mobile':'cn','China Unicom':'cn','China Telecom':'cn'
};

/* ═══════ INIT ═══════ */
(function(){
  document.documentElement.style.setProperty('--font-scale', FS[FS_IDX]);
  if(DARK){ document.body.classList.add('dark'); setDarkUI(true); }
})();

/* ═══════ DARK MODE ═══════ */
function toggleDark(){
  DARK=!DARK;
  document.body.classList.toggle('dark',DARK);
  localStorage.setItem('tw_dark',DARK?'1':'0');
  setDarkUI(DARK);
}
function setDarkUI(on){
  var icon=document.getElementById('darkIcon');
  var lbl=document.getElementById('darkLabel');
  var btn=document.getElementById('darkToggle');
  if(on){
    icon.innerHTML='<path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z"/>';
    if(lbl) lbl.textContent='라이트모드';
    if(btn) btn.classList.add('on');
  } else {
    icon.innerHTML='<path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M3.5 12.5l.7-.7M11.8 4.2l.7-.7"/><circle cx="8" cy="8" r="3"/>';
    if(lbl) lbl.textContent='다크모드';
    if(btn) btn.classList.remove('on');
  }
}

/* ═══════ FONT SIZE ═══════ */
function changeFont(dir){
  if(dir===0){ FS_IDX=1; }
  else { FS_IDX=Math.min(Math.max(FS_IDX+dir,0),FS.length-1); }
  localStorage.setItem('tw_fs',FS_IDX);
  document.documentElement.style.setProperty('--font-scale',FS[FS_IDX]);
}

/* ═══════ REFRESH ═══════ */
function refreshData(btn){
  if(btn){ btn.style.opacity='0.5'; btn.disabled=true; }
  fetch('data/articles.json?_='+Date.now())
    .then(function(r){return r.json();})
    .then(function(data){
      ALL=data.articles||[];
      renderBanner(data); renderStats(); renderCarriers(); render();
      if(btn){btn.style.opacity='';btn.disabled=false;}
      toast('데이터를 새로 불러왔어요.');
    })
    .catch(function(){
      if(btn){btn.style.opacity='';btn.disabled=false;}
      toast('새로고침 실패 — 잠시 후 다시 시도해주세요.');
    });
}

/* ═══════ BOOKMARK ═══════ */
function toggleBM(id, e){
  if(e) e.stopPropagation();
  var i=BM.indexOf(id);
  if(i===-1){ BM.push(id); toast('북마크에 저장했어요.'); }
  else { BM.splice(i,1); toast('북마크에서 제거했어요.'); }
  localStorage.setItem('tw_bm',JSON.stringify(BM));
  if(S.region==='bookmarks'){ render(); return; }
  document.querySelectorAll('.article-card[data-id="'+id+'"]').forEach(function(card){
    var saved=BM.indexOf(id)!==-1;
    card.classList.toggle('bookmarked',saved);
    card.querySelectorAll('.bm-btn').forEach(function(b){
      b.classList.toggle('saved',saved);
      b.innerHTML=bmIcon(saved)+(saved?' 저장됨':' 북마크');
    });
  });
}
function bmIcon(saved){
  return saved
    ? '<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h8a1 1 0 0 1 1 1v11l-5-3-5 3V3a1 1 0 0 1 1-1z"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 2h8a1 1 0 0 1 1 1v11l-5-3-5 3V3a1 1 0 0 1 1-1z"/></svg>';
}

/* ═══════ MODAL ═══════ */
function openModal(id){
  var a=ALL.find(function(x){return x.id===id;});
  if(!a) return;
  MODAL_A=a;
  var cm=CM[a.country]||CM.domestic;
  var saved=BM.indexOf(a.id)!==-1;
  var stars='';
  for(var i=1;i<=5;i++) stars+='<span class="star '+(i<=a.importance?'filled':'empty')+'">★</span>';

  var metaHtml=(a.tags||[]).map(function(t){return '<span class="tag tag-topic">'+esc(t)+'</span>';}).join('');
  metaHtml+='<span class="tag '+cm.cls+'">'+cm.flag+' '+cm.label+(a.carrier?' · '+esc(a.carrier):'')+' </span>';
  metaHtml+='<span class="tag tag-ai">✦ AI 요약</span>';

  document.getElementById('modalMeta').innerHTML=metaHtml;
  document.getElementById('modalTitle').textContent=a.title||'';
  document.getElementById('modalImportance').innerHTML='<span style="font-size:11px;color:var(--text-tertiary);margin-right:4px;">중요도</span>'+stars;
  document.getElementById('modalSummary').textContent=a.summary||'';
  document.getElementById('modalDate').textContent=a.date+(a.source_name?' · '+a.source_name:'');

  var act='<button class="modal-btn '+(saved?'saved':'')+'" onclick="toggleBM(\''+a.id+'\',event)">'+bmIcon(saved)+' '+(saved?'저장됨':'북마크')+'</button>';
  act+='<button class="modal-btn kakao" onclick="shareKakao(MODAL_A,event)">카카오 공유</button>';
  act+='<button class="modal-btn telegram" onclick="shareTelegram(MODAL_A,event)">텔레그램 공유</button>';
  if(a.source_url) act+='<a class="modal-btn primary" href="'+esc(a.source_url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">원문 보기 →</a>';
  document.getElementById('modalActions').innerHTML=act;
  document.getElementById('articleModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('articleModal').classList.remove('open');
  document.body.style.overflow='';
  MODAL_A=null;
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

/* ═══════ SHARE ═══════ */
function shareKakao(a, e){
  if(e) e.stopPropagation();
  if(!a) a=MODAL_A; if(!a) return;
  var text='[Telecom Watch] '+a.title+'\n\n'+a.summary+'\n\n('+a.date+(a.source_name?' · '+a.source_name:'')+')';
  var url=a.source_url||window.location.href;
  if(navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
    navigator.share({title:a.title,text:text,url:url}).catch(function(){copyText(text);});
  } else {
    copyText(text);
  }
}
function shareTelegram(a, e){
  if(e) e.stopPropagation();
  if(!a) a=MODAL_A; if(!a) return;
  var text='[Telecom Watch] '+a.title+'\n'+a.summary;
  var url=a.source_url||window.location.href;
  window.open('https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(text),'_blank','noopener,width=600,height=500');
}
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text)
      .then(function(){toast('클립보드에 복사했어요. 카카오톡에 붙여넣기 해주세요.');})
      .catch(function(){fallbackCopy(text);});
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand('copy');toast('클립보드에 복사했어요. 카카오톡에 붙여넣기 해주세요.');}
  catch(er){toast('복사 실패 — 직접 선택 후 복사해 주세요.');}
  document.body.removeChild(ta);
}

/* ═══════ EXPORT ═══════ */
function exportFile(type){
  var articles=filtered();
  var ts=new Date().toISOString().slice(0,10);
  if(type==='csv'){
    var header=['날짜','제목','요약','태그','국가','통신사','중요도','출처URL','출처명'];
    var rows=articles.map(function(a){
      return [a.date,a.title,a.summary,(a.tags||[]).join('/'),a.country,a.carrier||'',a.importance,a.source_url||'',a.source_name||'']
        .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
    });
    dl('﻿'+header.join(',')+'\n'+rows.join('\n'),'telecom-watch-'+ts+'.csv','text/csv');
    toast('CSV 파일을 다운로드했어요.');
  } else {
    dl(JSON.stringify({exported:new Date().toISOString(),count:articles.length,articles:articles},null,2),'telecom-watch-'+ts+'.json','application/json');
    toast('JSON 파일을 다운로드했어요.');
  }
}
function dl(content,name,mime){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href);
}

/* ═══════ CARRIERS ═══════ */
function renderCarriers(){
  var carrierCounts={};
  ALL.forEach(function(a){ if(a.carrier){ carrierCounts[a.carrier]=(carrierCounts[a.carrier]||0)+1; } });
  var html='<div class="carrier-item" onclick="setCarrier(\'all\',this)" data-c="all"><span class="carrier-dot" style="background:var(--purple-400);"></span><span>전체</span></div>';
  Object.keys(CARRIER_COUNTRY).forEach(function(c){
    var cnt=carrierCounts[c]||0; if(!cnt) return;
    var cc=CARRIER_COUNTRY[c]; var cm=CM[cc];
    html+='<div class="carrier-item" onclick="setCarrier(\''+esc(c)+'\',this)" data-c="'+esc(c)+'">'
      +'<span class="carrier-dot" style="background:'+cm.dot+';"></span>'
      +'<span>'+esc(c)+'</span>'
      +'<span class="carrier-country">'+cm.flag+'</span>'
      +'<span class="nav-count">'+cnt+'</span>'
      +'</div>';
  });
  document.getElementById('carrierList').innerHTML=html;
  document.querySelector('#carrierList .carrier-item').classList.add('active');
}
function setCarrier(val,btn){
  S.carrier=val;
  document.querySelectorAll('#carrierList .carrier-item').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  else { var el=document.querySelector('#carrierList [data-c="'+val+'"]'); if(el) el.classList.add('active'); }
  render();
}

/* ═══════ BUILD CARD ═══════ */
function buildCard(a){
  var cm=CM[a.country]||CM.domestic;
  var stars=''; for(var i=1;i<=5;i++) stars+='<span class="star '+(i<=a.importance?'filled':'empty')+'">★</span>';
  var tags=(a.tags||[]).map(function(t){return '<span class="tag tag-topic">'+esc(t)+'</span>';}).join('');
  var regionTag='<span class="tag '+cm.cls+'">'+cm.flag+' '+cm.label+(a.carrier?' · '+esc(a.carrier):'')+' </span>';
  var aiTag='<span class="tag tag-ai">✦ AI 요약</span>';
  var saved=BM.indexOf(a.id)!==-1;
  var srcBtn=a.source_url
    ? '<button class="action-btn source" onclick="event.stopPropagation();window.open(\''+esc(a.source_url)+'\',\'_blank\',\'noopener\')">'
      +'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-3M9 2h5v5M14 2l-6 6"/></svg>원문</button>'
    : '';
  return '<div class="article-card'+(saved?' bookmarked':'')+'" data-id="'+a.id+'" onclick="openModal(\''+a.id+'\')">'
    +'<div class="bookmark-dot"></div>'
    +'<div class="card-meta">'+tags+aiTag+regionTag+'<div class="importance">'+stars+'</div></div>'
    +'<div class="card-title">'+esc(a.title)+'</div>'
    +'<div class="card-summary">'+esc(a.summary)+'</div>'
    +'<div class="card-footer">'
    +'<span class="card-date">'+a.date+'</span>'
    +'<div class="card-actions">'
    +srcBtn
    +'<button class="action-btn bookmark bm-btn'+(saved?' saved':'')+'" onclick="toggleBM(\''+a.id+'\',event)">'+bmIcon(saved)+(saved?' 저장됨':' 북마크')+'</button>'
    +'<button class="share-btn kakao" onclick="event.stopPropagation();shareKakao(ALL.find(function(x){return x.id===\''+a.id+'\'}))">'
    +'<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.82 1.7 5.3 4.27 6.8L5.2 21l4.26-2.22C10.26 19.05 11.12 19.1 12 19.1c5.52 0 10-3.58 10-8.05S17.52 3 12 3z"/></svg>카카오</button>'
    +'<button class="share-btn telegram" onclick="event.stopPropagation();shareTelegram(ALL.find(function(x){return x.id===\''+a.id+'\'}))">'
    +'<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.92c-.12.56-.46.7-.93.44l-2.58-1.9-1.25 1.2c-.14.14-.26.26-.53.26l.19-2.64 4.82-4.36c.21-.19-.04-.3-.32-.11L7.54 14.6 5 13.8c-.56-.17-.57-.56.12-.83l8.97-3.46c.47-.17.88.11.72.83z"/></svg>텔레그램</button>'
    +'</div></div></div>';
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function sHead(sec,label,style){
  return '<div class="section-head" data-sec="'+sec+'" style="'+(style||'')+'"><span class="section-head-label" style="'+(label.s||'')+'">'+label.t+'</span><div class="section-head-line" style="'+(label.ls||'')+'"></div></div>';
}

/* ═══════ FILTER ═══════ */
function filtered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var TT=TOPIC_MAP[S.topic]||[];
  var result=ALL.filter(function(a){
    if(S.region==='bookmarks') return BM.indexOf(a.id)!==-1;
    var text=(a.title+' '+a.summary+' '+(a.tags||[]).join(' ')).toLowerCase();
    var rOk=S.region==='all'||S.region==='archive'||a.region===S.region;
    var tOk=S.topic==='all'||TT.some(function(t){return(a.tags||[]).indexOf(t)!==-1;});
    var cOk=S.country==='all'||a.country===S.country;
    var chipOk=S.chip==='all'||(a.tags||[]).indexOf(S.chip)!==-1;
    var dOk=S.date==='all'||a.date===S.date;
    var carOk=S.carrier==='all'||a.carrier===S.carrier;
    var sOk=!q||text.indexOf(q)!==-1;
    return rOk&&tOk&&cOk&&chipOk&&dOk&&carOk&&sOk;
  });
  if(S.sort) result=result.slice().sort(function(a,b){return b.importance-a.importance;});
  return result;
}

/* ═══════ RENDER ═══════ */
function render(){
  var articles=filtered();
  var feed=document.getElementById('mainFeed');
  if(!articles.length){
    feed.innerHTML='<div style="padding:40px 0;text-align:center;color:var(--text-tertiary);font-size:13px;">'
      +(S.region==='bookmarks'?'저장된 북마크가 없어요. 카드의 북마크 버튼을 눌러 저장하세요.':'수집된 기사가 없습니다.')+'</div>';
    return;
  }
  if(S.sort||S.region==='bookmarks'||S.region==='archive'){
    feed.innerHTML=articles.map(buildCard).join(''); return;
  }
  var dom=articles.filter(function(a){return a.region==='domestic';});
  var ovr=articles.filter(function(a){return a.region==='overseas';});
  var html='';
  if(dom.length){ html+=sHead('domestic',{t:'국내'}); dom.forEach(function(a){html+=buildCard(a);}); }
  if(ovr.length){
    html+=sHead('overseas',{t:'해외'},'margin-top:6px;');
    ['us','jp','eu','cn'].forEach(function(cc){
      var cm=CM[cc]; var sub=ovr.filter(function(a){return a.country===cc;});
      if(!sub.length) return;
      html+=sHead('overseas',{t:cm.flag+' '+cm.label,s:'font-size:10px;color:'+cm.dot,ls:'background:'+cm.dot+'22'},'margin-top:4px;');
      sub.forEach(function(a){html+=buildCard(a);});
    });
  }
  feed.innerHTML=html;
}

/* ═══════ STATS ═══════ */
function renderStats(){
  var total=ALL.length;
  var cOrder=[['domestic','🇰🇷 국내'],['us','🇺🇸 미국'],['jp','🇯🇵 일본'],['eu','🇪🇺 유럽'],['cn','🇨🇳 중국']];
  var cHtml='';
  cOrder.forEach(function(p){
    var cnt=ALL.filter(function(a){return a.country===p[0];}).length; if(!cnt) return;
    cHtml+='<div class="stat-row"><span class="stat-label">'+p[1]+'</span><span class="stat-count">'+cnt+'건</span></div>';
  });
  cHtml+='<div class="stat-row" style="margin-top:6px;padding-top:8px;border-top:0.5px solid var(--border);">'
    +'<span class="stat-label" style="font-weight:500;">총 수집</span><span class="stat-count" style="font-size:15px;">'+total+'건</span></div>';
  document.getElementById('statCountry').innerHTML=cHtml;

  var TAGS=['요금제','최적요금제','리텐션','결합상품','이용약관','안면인증'];
  var tc={}; var mx=1;
  TAGS.forEach(function(t){ tc[t]=ALL.filter(function(a){return(a.tags||[]).indexOf(t)!==-1;}).length; if(tc[t]>mx) mx=tc[t]; });
  document.getElementById('statTopic').innerHTML=TAGS.map(function(t){
    var pct=Math.round((tc[t]/mx)*100);
    return '<div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:3px;"><span>'+t+'</span><span style="color:var(--text-tertiary);">'+tc[t]+'</span></div>'
      +'<div style="background:var(--gray-100);border-radius:2px;height:4px;"><div style="width:'+pct+'%;height:4px;background:var(--purple-600);border-radius:2px;"></div></div></div>';
  }).join('');

  var dates=[]; var seen={};
  ALL.forEach(function(a){if(a.date&&!seen[a.date]){seen[a.date]=true;dates.push(a.date);}});
  dates.sort().reverse();
  var aHtml='<button class="date-chip active" onclick="setDate(\'all\',this)">전체</button>';
  dates.slice(0,20).forEach(function(d){aHtml+='<button class="date-chip" onclick="setDate(\''+d+'\',this)">'+d.slice(5).replace('-','/')+'</button>';});
  document.getElementById('archiveDates').innerHTML=aHtml;

  document.getElementById('nc-all').textContent=total;
  TAGS.forEach(function(t){var el=document.getElementById('nc-'+t);if(el)el.textContent=tc[t]||0;});
  var cmap={}; ALL.forEach(function(a){cmap[a.country]=(cmap[a.country]||0)+1;});
  ['domestic','us','jp','eu','cn'].forEach(function(c){var el=document.getElementById('nc-'+c);if(el)el.textContent=cmap[c]||0;});
}

/* ═══════ BANNER ═══════ */
function renderBanner(data){
  var today=new Date().toISOString().slice(0,10);
  var ta=ALL.filter(function(a){return a.date===today;});
  var top=(ta.length?ta:ALL.slice(0,5)).slice().sort(function(a,b){return b.importance-a.importance;}).slice(0,5);
  var upd=data.updated?data.updated.slice(0,16).replace('T',' '):'';
  var dl=ta.length?today:(ALL[0]?ALL[0].date:'');
  document.getElementById('bannerLabel').textContent='오늘의 주요 이슈 — '+dl.replace(/-/g,'.');
  document.getElementById('bannerHeadline').innerHTML=top.map(function(a){return esc(a.title);}).join(' &nbsp;·&nbsp; ');
  document.getElementById('bannerDate').textContent='수집 '+(upd.slice(11)||'--:--')
    +' | 오늘 총 '+ta.length+'건'+(ta.length?' | 국내 '+ta.filter(function(a){return a.region==='domestic';}).length+'건 · 해외 '+ta.filter(function(a){return a.region==='overseas';}).length+'건':'');
}

/* ═══════ STATE SETTERS ═══════ */
function applyFilters(){ render(); }
function setRegionTab(val,btn){
  S.region=val;
  document.querySelectorAll('.header-nav .nav-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); render();
}
function setTopic(val,btn){
  S.topic=val;
  document.querySelectorAll('.left-nav .nav-item').forEach(function(b){
    if((b.getAttribute('onclick')||'').indexOf('setTopic')!==-1) b.classList.remove('active');
  });
  btn.classList.add('active'); render();
}
function setCountry(val,btn){
  S.country=val;
  document.querySelectorAll('.left-nav .nav-item').forEach(function(b){
    if((b.getAttribute('onclick')||'').indexOf('setCountry')!==-1) b.classList.remove('active');
  });
  btn.classList.add('active'); render();
}
function setChip(val,btn){
  S.chip=val;
  document.querySelectorAll('.filter-chip').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); render();
}
function setDate(val,btn){
  S.date=val;
  document.querySelectorAll('.date-chip').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); render();
}
function toggleSort(btn){
  S.sort=!S.sort; btn.classList.toggle('active',S.sort); render();
}
function toggleSummary(btn){
  document.body.classList.toggle('summary-mode');
  btn.classList.toggle('on');
  btn.textContent=document.body.classList.contains('summary-mode')?'전체 보기':'요약 모드';
}

/* ═══════ TOAST ═══════ */
var _tt;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove('show');},3000);
}

/* ═══════ LOAD ═══════ */
fetch('data/articles.json')
  .then(function(r){return r.json();})
  .then(function(data){
    ALL=data.articles||[];
    renderBanner(data); renderStats(); renderCarriers(); render();
  })
  .catch(function(){
    document.getElementById('mainFeed').innerHTML=
      '<div style="padding:40px 0;text-align:center;color:var(--text-tertiary);font-size:13px;">데이터를 불러올 수 없습니다. 페이지를 새로고침 해주세요.</div>';
  });
</script>
