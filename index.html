<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecom Watch — 통신산업 동향 모니터</title>
<style>
  :root {
    --blue:      #2B1EDE;
    --blue-dark: #1E14B0;
    --blue-mid:  #6B62F0;
    --blue-lite: #EBE9FF;
    --text:      #111111;
    --text-2:    #555555;
    --text-3:    #999999;
    --border:    #E8E8E8;
    --bg:        #F4F4F8;
    --surface:   #FFFFFF;
    --fs: 1;
  }
  body.dark {
    --blue-lite: #1E1A5A;
    --text:    #F0F0F0;
    --text-2:  #AAAAAA;
    --text-3:  #666666;
    --border:  rgba(255,255,255,0.1);
    --bg:      #0C0B1A;
    --surface: #161528;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif; background: var(--bg); color: var(--text); font-size: calc(14px * var(--fs)); line-height: 1.7; transition: background 0.2s, color 0.2s; }

  /* ── HEADER ── */
  .hdr { background: var(--blue); height: 50px; display: flex; align-items: center; padding: 0 24px; gap: 0; position: sticky; top: 0; z-index: 300; }
  .hdr-logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; margin-right: 24px; }
  .hdr-logo-icon { width: 24px; height: 24px; border-radius: 5px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
  .hdr-logo-icon svg { width: 13px; height: 9px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .hdr-logo-text { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
  .hdr-nav { display: flex; flex: 1; height: 100%; }
  .hdr-nav-btn { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 13px; padding: 0 14px; cursor: pointer; font-family: inherit; height: 100%; border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; white-space: nowrap; }
  .hdr-nav-btn:hover { color: rgba(255,255,255,0.9); }
  .hdr-nav-btn.active { color: #fff; font-weight: 500; border-bottom-color: rgba(255,255,255,0.55); }
  .hdr-tools { display: flex; align-items: center; gap: 4px; margin-left: 16px; flex-shrink: 0; }
  .hdr-icon { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.8); width: 32px; height: 32px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
  .hdr-icon:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .hdr-icon svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; }
  .hdr-search-overlay { display: none; position: absolute; inset: 0; background: var(--blue-dark); align-items: center; padding: 0 16px; gap: 10px; z-index: 10; }
  .hdr-search-overlay.open { display: flex; }
  .hdr-search-overlay input { flex: 1; background: rgba(255,255,255,0.12); border: none; outline: none; color: #fff; font-size: 14px; padding: 7px 14px; border-radius: 7px; font-family: inherit; }
  .hdr-search-overlay input::placeholder { color: rgba(255,255,255,0.4); }
  .hdr-search-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px 8px; }

  /* ── HERO ── */
  .hero { background: var(--blue); padding: 0 24px 18px; }
  .hero-label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; padding-bottom: 10px; }
  .hero-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .hero-card { background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.14); border-radius: 10px; padding: 14px; cursor: pointer; transition: background 0.12s; }
  .hero-card:hover { background: rgba(255,255,255,0.17); }
  .hero-card-topic { font-size: 9px; color: rgba(255,255,255,0.5); margin-bottom: 7px; }
  .hero-card-title { font-size: 12px; font-weight: 500; color: #fff; line-height: 1.5; }
  .hero-card-stars { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 10px; letter-spacing: 1px; }

  /* ── TAB BAR ── */
  .tab-bar { background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; padding: 0 24px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 50px; z-index: 200; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { background: none; border: none; font-family: inherit; font-size: 13px; color: var(--text-3); padding: 11px 14px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.12s; }
  .tab-btn:hover { color: var(--text-2); }
  .tab-btn.active { color: var(--blue); font-weight: 500; border-bottom-color: var(--blue); }

  /* ── FEED ── */
  .feed-wrap { max-width: 800px; margin: 0 auto; padding: 4px 24px 80px; }
  .sec-label { font-size: 9px; font-weight: 600; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 0 6px; }
  .sub-label { font-size: 10px; color: var(--text-3); font-weight: 500; padding: 10px 0 4px; }

  /* ── LIST ROW ── */
  .list-row { display: flex; align-items: flex-start; gap: 11px; padding: 11px 8px; border-bottom: 0.5px solid var(--border); cursor: pointer; border-radius: 7px; transition: background 0.1s; margin: 0 -8px; }
  .list-row:hover { background: var(--blue-lite); border-bottom-color: transparent; }
  .list-accent { width: 3px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
  .list-body { flex: 1; min-width: 0; }
  .list-tags { display: flex; gap: 4px; margin-bottom: 3px; flex-wrap: wrap; }
  .list-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; }
  .list-summary { font-size: 11px; color: var(--text-3); line-height: 1.55; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .list-summary.hidden { display: none; }
  .list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; padding-top: 2px; }
  .list-stars { font-size: 10px; letter-spacing: 1px; }
  .list-date { font-size: 10px; color: var(--text-3); white-space: nowrap; }

  /* ── TAGS ── */
  .tag { display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; line-height: 1.6; }
  .t-topic { background: var(--blue-lite); color: #1B0FAA; }
  .t-ai { background: var(--blue); color: #fff; }
  .t-kr { background: #E8F5EE; color: #0B5E2E; }
  .t-us { background: #E8EFFD; color: #0F3A8A; }
  .t-jp { background: #FFF3EE; color: #8B3210; }
  .t-eu { background: #EEF2FF; color: #1B3A9A; }
  .t-cn { background: #FEF0F0; color: #8A1A1A; }
  body.dark .t-kr { background: #1a3a28; color: #4ade80; }
  body.dark .t-us { background: #1a2a4a; color: #60a5fa; }
  body.dark .t-jp { background: #3a2010; color: #fb923c; }
  body.dark .t-eu { background: #1e1a4a; color: #818cf8; }
  body.dark .t-cn { background: #3a1010; color: #f87171; }

  /* ── MODAL ── */
  #modal { display: none; position: fixed; inset: 0; z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  #modal.open { display: flex; }
  .modal-bg { position: absolute; inset: 0; background: rgba(8,6,28,0.55); backdrop-filter: blur(3px); }
  .modal-box { position: relative; background: var(--surface); border-radius: 16px; max-width: 660px; width: 100%; max-height: 90vh; overflow-y: auto; z-index: 1; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--bg); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .modal-close:hover { background: var(--border); }

  /* 헤더 영역 */
  .modal-head { background: var(--blue); border-radius: 16px 16px 0 0; padding: 24px 28px 20px; }
  .modal-head-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .modal-head-tag { display: inline-block; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 500; background: rgba(255,255,255,0.18); color: #fff; }
  .modal-head-tag.country { background: rgba(255,255,255,0.25); }
  .modal-head-title { font-size: 18px; font-weight: 600; color: #fff; line-height: 1.45; margin-bottom: 14px; }
  .modal-head-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .modal-head-source { font-size: 11px; color: rgba(255,255,255,0.6); }
  .modal-head-imp { display: flex; gap: 2px; }
  .modal-head-star { font-size: 12px; }

  /* 본문 */
  .modal-body { padding: 24px 28px; }
  .modal-body-label { font-size: 9px; font-weight: 600; color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .modal-body-label::after { content: ''; flex: 1; height: 0.5px; background: var(--blue-lite); }
  .modal-para { font-size: 14px; color: var(--text-2); line-height: 1.85; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .modal-para:last-of-type { border-bottom: none; }
  .modal-para::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-right: 10px; vertical-align: middle; flex-shrink: 0; }

  /* 원문 영역 */
  .modal-source-box { margin: 16px 0 0; padding: 14px 16px; background: var(--bg); border-radius: 10px; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .modal-source-info { font-size: 12px; color: var(--text-3); line-height: 1.5; }
  .modal-source-info strong { color: var(--text-2); font-weight: 500; display: block; margin-bottom: 1px; }
  .modal-source-link { display: inline-flex; align-items: center; gap: 5px; padding: 7px 16px; background: var(--blue); color: #fff; border-radius: 10px; font-size: 12px; font-weight: 500; text-decoration: none; white-space: nowrap; transition: background 0.12s; border: none; cursor: pointer; font-family: inherit; }
  .modal-source-link:hover { background: var(--blue-dark); }
  .modal-source-link svg { width: 12px; height: 12px; fill: none; stroke: #fff; stroke-width: 2; }
  .modal-source-nolink { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--border); color: var(--text-3); border-radius: 10px; font-size: 12px; white-space: nowrap; }

  /* 하단 액션 */
  .modal-actions-row { padding: 0 28px 20px; display: flex; gap: 6px; flex-wrap: wrap; }
  .m-btn { display: flex; align-items: center; gap: 4px; padding: 6px 13px; border-radius: 12px; font-size: 12px; font-family: inherit; cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--text-2); transition: all 0.12s; text-decoration: none; }
  .m-btn:hover { background: var(--bg); }
  .m-btn.bm { color: var(--blue); background: var(--blue-lite); border-color: var(--blue-mid); }
  .m-btn.kakao:hover { background: #FEE500; color: #3A1D1D; border-color: #E6CF00; }
  .m-btn.telegram:hover { background: #E8F4FD; color: #0088CC; border-color: #9ECFEC; }

  /* ── SETTINGS PANEL ── */
  #settingsBg { display: none; position: fixed; inset: 0; z-index: 399; }
  #settingsBg.open { display: block; }
  #settingsPanel { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 280px; background: var(--surface); border-left: 0.5px solid var(--border); z-index: 400; overflow-y: auto; }
  #settingsPanel.open { display: block; }
  .s-header { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
  .s-header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .s-close { background: none; border: none; color: var(--text-3); font-size: 18px; cursor: pointer; line-height: 1; }
  .s-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }
  .s-section-title { font-size: 9px; font-weight: 600; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .s-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; font-size: 13px; color: var(--text); border-bottom: 0.5px solid var(--border); }
  .s-row:last-child { border-bottom: none; }
  .s-toggle { width: 36px; height: 20px; background: var(--border); border-radius: 10px; cursor: pointer; position: relative; transition: background 0.2s; border: none; flex-shrink: 0; }
  .s-toggle.on { background: var(--blue); }
  .s-toggle::after { content: ''; width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
  .s-toggle.on::after { left: 18px; }
  .s-font-row { display: flex; gap: 5px; }
  .s-font-btn { flex: 1; padding: 6px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; color: var(--text-2); }
  .s-font-btn.active, .s-font-btn:hover { background: var(--blue-lite); border-color: var(--blue); color: var(--blue); font-weight: 500; }
  .s-btn { width: 100%; padding: 9px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.12s; text-align: center; }
  .s-btn:hover { background: var(--blue-lite); border-color: var(--blue); color: var(--blue); }
  .s-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .s-btn.primary:hover { background: var(--blue-dark); }
  .s-btns { display: flex; gap: 6px; }
  .s-select { font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-family: inherit; max-width: 140px; }
  .s-date-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .s-chip { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg); color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.1s; }
  .s-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(14px); background: #111; color: #fff; font-size: 12px; padding: 8px 16px; border-radius: 20px; z-index: 9999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  body.dark #toast { background: #333; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── PRINT ── */
  @media print {
    .hdr, .hero, .tab-bar, #settingsPanel, #modal { display: none !important; }
    .feed-wrap { padding: 0 !important; max-width: 100% !important; }
    .list-row { break-inside: avoid; }
    .list-summary { display: block !important; -webkit-line-clamp: unset !important; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .hero-grid { grid-template-columns: 1fr 1fr; }
    .hdr { padding: 0 14px; }
    .hero { padding: 0 14px 14px; }
    .tab-bar { padding: 0 14px; }
    .feed-wrap { padding: 4px 14px 60px; }
    .hdr-nav-btn { padding: 0 10px; font-size: 12px; }
    #settingsPanel { width: 100%; }
    .modal-box { padding: 20px 16px; }
  }
  @media (max-width: 480px) {
    .hero-grid { grid-template-columns: 1fr; }
    .hdr-logo-text { font-size: 13px; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── MODAL ── -->
<div id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-head">
      <div class="modal-head-tags" id="mTags"></div>
      <div class="modal-head-title" id="mTitle"></div>
      <div class="modal-head-meta">
        <span class="modal-head-source" id="mMeta"></span>
        <div class="modal-head-imp" id="mImp"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-body-label">✦ AI 요약</div>
      <div id="mParas"></div>
      <div class="modal-source-box" id="mSourceBox"></div>
    </div>
    <div class="modal-actions-row" id="mActions"></div>
  </div>
</div>

<!-- ── SETTINGS ── -->
<div id="settingsBg" onclick="closeSettings()"></div>
<div id="settingsPanel">
  <div class="s-header">
    <span class="s-header-title">설정 · 도구</span>
    <button class="s-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="s-body">

    <div>
      <div class="s-section-title">화면</div>
      <div class="s-row">
        <span>다크 모드</span>
        <button class="s-toggle" id="darkToggle" onclick="toggleDark()"></button>
      </div>
      <div class="s-row" style="flex-direction:column;align-items:flex-start;gap:8px;">
        <span>글자 크기</span>
        <div class="s-font-row" style="width:100%;">
          <button class="s-font-btn" onclick="setFS(0)">A−</button>
          <button class="s-font-btn active" id="fsBtn1" onclick="setFS(1)">기본</button>
          <button class="s-font-btn" onclick="setFS(2)">A+</button>
        </div>
      </div>
      <div class="s-row">
        <span>요약 숨기기</span>
        <button class="s-toggle" id="summaryToggle" onclick="toggleSummary()"></button>
      </div>
    </div>

    <div>
      <div class="s-section-title">필터</div>
      <div class="s-row">
        <span>통신사</span>
        <select class="s-select" id="carrierSel" onchange="S.carrier=this.value;render()">
          <option value="all">전체</option>
        </select>
      </div>
      <div class="s-row">
        <span>중요도 순 정렬</span>
        <button class="s-toggle" id="sortToggle" onclick="toggleSort()"></button>
      </div>
      <div style="padding-top:8px;">
        <div style="font-size:11px;color:var(--text-3);margin-bottom:6px;">날짜 필터</div>
        <div class="s-date-chips" id="dateChips"></div>
      </div>
    </div>

    <div>
      <div class="s-section-title">데이터</div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <button class="s-btn primary" onclick="doRefresh()">↻ 데이터 새로고침</button>
        <div class="s-btns">
          <button class="s-btn" onclick="doExport('csv')">CSV 내보내기</button>
          <button class="s-btn" onclick="doExport('json')">JSON 내보내기</button>
        </div>
        <button class="s-btn" onclick="window.print()">인쇄</button>
      </div>
    </div>

  </div>
</div>

<!-- ── HEADER ── -->
<header class="hdr" style="position:sticky;top:0;">
  <div class="hdr-logo">
    <div class="hdr-logo-icon">
      <svg viewBox="0 0 16 12"><polyline points="1,10 4,6 7,8 10,4 13,6 15,2"/></svg>
    </div>
    <span class="hdr-logo-text">Telecom Watch</span>
  </div>
  <nav class="hdr-nav">
    <button class="hdr-nav-btn active" onclick="setRegion('all',this)">전체</button>
    <button class="hdr-nav-btn" onclick="setRegion('domestic',this)">국내</button>
    <button class="hdr-nav-btn" onclick="setRegion('overseas',this)">해외</button>
    <button class="hdr-nav-btn" onclick="setRegion('bookmarks',this)">북마크</button>
    <button class="hdr-nav-btn" onclick="setRegion('archive',this)">아카이브</button>
  </nav>
  <div class="hdr-tools">
    <button class="hdr-icon" onclick="openSearch()" aria-label="검색" title="검색">
      <svg viewBox="0 0 18 18"><circle cx="7.5" cy="7.5" r="5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg>
    </button>
    <button class="hdr-icon" onclick="setRegion('bookmarks',document.querySelector('.hdr-nav-btn:nth-child(4)'))" aria-label="북마크" title="북마크">
      <svg viewBox="0 0 18 18"><path d="M4 2h10a1 1 0 0 1 1 1v13l-6-3.5L3 16V3a1 1 0 0 1 1-1z"/></svg>
    </button>
    <button class="hdr-icon" onclick="openSettings()" aria-label="설정" title="설정">
      <svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="2.5"/><path d="M9 1.5v1.2M9 15.3v1.2M1.5 9h1.2M15.3 9h1.2M3.6 3.6l.85.85M13.55 13.55l.85.85M3.6 14.4l.85-.85M13.55 4.45l.85-.85"/></svg>
    </button>
  </div>
  <div class="hdr-search-overlay" id="searchBar">
    <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"><circle cx="7.5" cy="7.5" r="5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg>
    <input type="text" placeholder="기사 검색..." id="searchInput" oninput="render()" autocomplete="off">
    <button class="hdr-search-close" onclick="closeSearch()">✕</button>
  </div>
</header>

<!-- ── HERO ── -->
<div class="hero" id="heroWrap">
  <div class="hero-label" id="heroLabel">오늘의 주요 이슈</div>
  <div class="hero-grid" id="heroGrid">
    <div class="hero-card"><div class="hero-card-topic" style="opacity:.4;">로딩 중...</div><div class="hero-card-title" style="opacity:.2;background:rgba(255,255,255,0.15);height:36px;border-radius:4px;"></div></div>
    <div class="hero-card"><div class="hero-card-topic" style="opacity:.4;">로딩 중...</div><div class="hero-card-title" style="opacity:.2;background:rgba(255,255,255,0.15);height:36px;border-radius:4px;"></div></div>
    <div class="hero-card"><div class="hero-card-topic" style="opacity:.4;">로딩 중...</div><div class="hero-card-title" style="opacity:.2;background:rgba(255,255,255,0.15);height:36px;border-radius:4px;"></div></div>
  </div>
</div>

<!-- ── TAB BAR ── -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="setTopic('all',this)">전체</button>
  <button class="tab-btn" onclick="setTopic('요금제',this)">요금제</button>
  <button class="tab-btn" onclick="setTopic('최적요금제',this)">최적요금제</button>
  <button class="tab-btn" onclick="setTopic('리텐션',this)">리텐션</button>
  <button class="tab-btn" onclick="setTopic('결합상품',this)">결합상품</button>
  <button class="tab-btn" onclick="setTopic('이용약관',this)">이용약관</button>
  <button class="tab-btn" onclick="setTopic('안면인증',this)">안면인증</button>
  <button class="tab-btn" onclick="setTopic('규제·정책',this)">규제·정책</button>
</div>

<!-- ── FEED ── -->
<div class="feed-wrap">
  <div id="feedList">
    <div class="sec-label" style="text-align:center;padding:40px 0;color:var(--text-3);font-size:13px;letter-spacing:0;">데이터 로딩 중...</div>
  </div>
</div>

<script>
var ALL=[], S={region:'all',topic:'all',carrier:'all',date:'all',sort:false};
var BM=JSON.parse(localStorage.getItem('tw_bm')||'[]');
var DARK=localStorage.getItem('tw_dark')==='1';
var FS_IDX=parseInt(localStorage.getItem('tw_fs')||'1');
var FS=[0.88,1,1.13];
var SUMMARY=false;
var MA=null;

var CM={
  domestic:{flag:'🇰🇷',label:'국내',cls:'t-kr',dot:'#2B1EDE'},
  us:      {flag:'🇺🇸',label:'미국',cls:'t-us',dot:'#1D4ED8'},
  jp:      {flag:'🇯🇵',label:'일본',cls:'t-jp',dot:'#9A3412'},
  eu:      {flag:'🇪🇺',label:'유럽',cls:'t-eu',dot:'#3730A3'},
  cn:      {flag:'🇨🇳',label:'중국',cls:'t-cn',dot:'#991B1B'},
};

(function(){
  document.documentElement.style.setProperty('--fs',FS[FS_IDX]);
  if(DARK){document.body.classList.add('dark');document.getElementById('darkToggle').classList.add('on');}
})();

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
var _tt;
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}

/* DARK */
function toggleDark(){DARK=!DARK;document.body.classList.toggle('dark',DARK);localStorage.setItem('tw_dark',DARK?'1':'0');document.getElementById('darkToggle').classList.toggle('on',DARK);}

/* FONT */
function setFS(i){FS_IDX=i;localStorage.setItem('tw_fs',i);document.documentElement.style.setProperty('--fs',FS[i]);document.querySelectorAll('.s-font-btn').forEach(function(b,j){b.classList.toggle('active',j===i);});}

/* SUMMARY */
function toggleSummary(){SUMMARY=!SUMMARY;document.getElementById('summaryToggle').classList.toggle('on',SUMMARY);render();}

/* SORT */
function toggleSort(){S.sort=!S.sort;document.getElementById('sortToggle').classList.toggle('on',S.sort);render();}

/* SEARCH */
function openSearch(){document.getElementById('searchBar').classList.add('open');document.getElementById('searchInput').focus();}
function closeSearch(){document.getElementById('searchBar').classList.remove('open');document.getElementById('searchInput').value='';render();}

/* SETTINGS */
function openSettings(){document.getElementById('settingsPanel').classList.add('open');document.getElementById('settingsBg').classList.add('open');}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');document.getElementById('settingsBg').classList.remove('open');}

/* REFRESH */
function doRefresh(){
  closeSettings();
  fetch('data/articles.json?_='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){ALL=d.articles||[];renderHero(d);buildDateChips();buildCarrierFilter();render();toast('새로 불러왔어요.');})
    .catch(function(){toast('새로고침 실패 — 잠시 후 다시 시도해주세요.');});
}

/* BOOKMARK */
function toggleBM(id,ev){
  if(ev)ev.stopPropagation();
  var i=BM.indexOf(id);
  if(i===-1){BM.push(id);toast('북마크에 저장했어요.');}
  else{BM.splice(i,1);toast('북마크 해제했어요.');}
  localStorage.setItem('tw_bm',JSON.stringify(BM));
  if(S.region==='bookmarks'){render();return;}
  if(MA&&MA.id===id){var btn=document.getElementById('mBmBtn');if(btn){var sv=BM.indexOf(id)!==-1;btn.className='m-btn'+(sv?' bm':'');btn.textContent=sv?'★ 저장됨':'☆ 북마크';}}
  render();
}

/* SHARE */
function shareKakao(a,ev){if(ev)ev.stopPropagation();var t='[Telecom Watch] '+a.title+'\n\n'+a.summary+'\n\n('+a.date+(a.source_name?' · '+a.source_name:'')+')';if(navigator.share&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){navigator.share({title:a.title,text:t,url:a.source_url||location.href}).catch(function(){cp(t);});}else{cp(t);}}
function shareTelegram(a,ev){if(ev)ev.stopPropagation();var url=a.source_url||location.href;window.open('https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent('[Telecom Watch] '+a.title+'\n'+a.summary),'_blank','noopener,width=600,height=480');}
function cp(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('클립보드에 복사했어요. 카카오톡에 붙여넣기 해주세요.');}).catch(function(){fb(t);});}else{fb(t);}}
function fb(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast('클립보드에 복사했어요.');}catch(er){toast('직접 선택 후 복사해 주세요.');}document.body.removeChild(ta);}

/* MODAL */
function openModal(id){
  var a=ALL.find(function(x){return x.id===id;});if(!a)return;
  MA=a;
  var cm=CM[a.country]||CM.domestic;
  var saved=BM.indexOf(id)!==-1;

  /* 헤더 태그 */
  var tH=(a.tags||[]).map(function(t){return '<span class="modal-head-tag">'+e(t)+'</span>';}).join('');
  tH+='<span class="modal-head-tag country">'+cm.flag+' '+cm.label+(a.carrier?' · '+e(a.carrier):'')+'</span>';
  document.getElementById('mTags').innerHTML=tH;
  document.getElementById('mTitle').textContent=a.title||'';
  document.getElementById('mMeta').textContent=a.date+(a.source_name?' · '+a.source_name:'');

  /* 중요도 별 */
  var imp=a.importance||3;
  var stars='';
  for(var i=1;i<=5;i++) stars+='<span class="modal-head-star" style="color:'+(i<=imp?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.25)')+'">★</span>';
  document.getElementById('mImp').innerHTML=stars;

  /* 요약 → 문장 분리해서 단락으로 */
  var summary=a.summary||'';
  var paras=summary.split(/(?<=\.) (?=[가-힣A-Z])/);
  if(paras.length===1) paras=summary.split('. ').filter(function(s){return s.trim();});
  var parasHtml=paras.map(function(p){
    var t=p.trim(); if(!t) return '';
    if(!t.endsWith('.')) t+='.';
    return '<div class="modal-para">'+e(t)+'</div>';
  }).join('');
  document.getElementById('mParas').innerHTML=parasHtml||'<div class="modal-para">'+e(summary)+'</div>';

  /* 원문 소스 박스 */
  var srcHtml='<div class="modal-source-info"><strong>출처</strong>'
    +(a.source_name?e(a.source_name):'알 수 없음')
    +(a.date?' &nbsp;·&nbsp; '+a.date:'')
    +'</div>';
  if(a.source_url){
    srcHtml+='<a class="modal-source-link" href="'+e(a.source_url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'
      +'<svg viewBox="0 0 14 14"><path d="M6 2H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V8M8 1h5v5M13 1l-6 6"/></svg>'
      +'원문 보기</a>';
  } else {
    srcHtml+='<span class="modal-source-nolink">원문 링크 없음</span>';
  }
  document.getElementById('mSourceBox').innerHTML=srcHtml;

  /* 하단 액션 버튼 */
  var ac='<button class="m-btn'+(saved?' bm':'')+'" id="mBmBtn" onclick="toggleBM(\''+a.id+'\',event)">'+(saved?'★ 저장됨':'☆ 북마크')+'</button>';
  ac+='<button class="m-btn kakao" onclick="shareKakao(MA,event)">카카오 공유</button>';
  ac+='<button class="m-btn telegram" onclick="shareTelegram(MA,event)">텔레그램 공유</button>';
  document.getElementById('mActions').innerHTML=ac;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';MA=null;}
document.addEventListener('keydown',function(ev){if(ev.key==='Escape'){closeModal();closeSearch();}});

/* EXPORT */
function doExport(type){
  var arts=filtered();var ts=new Date().toISOString().slice(0,10);
  if(type==='csv'){var h=['날짜','제목','요약','태그','국가','통신사','중요도','출처URL','출처명'];var rows=arts.map(function(a){return[a.date,a.title,a.summary,(a.tags||[]).join('/'),a.country,a.carrier||'',a.importance,a.source_url||'',a.source_name||''].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');});dl('﻿'+h.join(',')+'\n'+rows.join('\n'),'telecom-watch-'+ts+'.csv','text/csv');}
  else{dl(JSON.stringify({exported:new Date().toISOString(),count:arts.length,articles:arts},null,2),'telecom-watch-'+ts+'.json','application/json');}
  toast((type==='csv'?'CSV':'JSON')+' 파일 다운로드했어요.');
}
function dl(c,n,m){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;a.click();URL.revokeObjectURL(a.href);}

/* HERO */
function renderHero(data){
  var today=new Date().toISOString().slice(0,10);
  var ta=ALL.filter(function(a){return a.date===today;});
  var src=ta.length?ta:ALL.slice(0,10);
  var top3=src.slice().sort(function(a,b){return b.importance-a.importance;}).slice(0,3);
  var dl=ta.length?today:(ALL[0]?ALL[0].date:'');
  var upd=data.updated?data.updated.slice(11,16):'';
  document.getElementById('heroLabel').textContent='오늘의 주요 이슈 — '+dl.replace(/-/g,'.')+' · '+upd+' 수집';
  document.getElementById('heroGrid').innerHTML=top3.map(function(a){
    var cm=CM[a.country]||CM.domestic;
    var stars='';for(var i=1;i<=5;i++)stars+=(i<=a.importance?'★':'☆');
    return '<div class="hero-card" onclick="openModal(\''+a.id+'\')">'
      +'<div class="hero-card-topic">'+e((a.tags&&a.tags[0])||'')+'  ·  '+cm.flag+' '+cm.label+(a.carrier?' · '+e(a.carrier):'')+'</div>'
      +'<div class="hero-card-title">'+e(a.title)+'</div>'
      +'<div class="hero-card-stars">'+stars+'</div>'
      +'</div>';
  }).join('');
}

/* DATE CHIPS */
function buildDateChips(){
  var dates=[],seen={};
  ALL.forEach(function(a){if(a.date&&!seen[a.date]){seen[a.date]=true;dates.push(a.date);}});
  dates.sort().reverse();
  var h='<button class="s-chip active" onclick="setDate(\'all\',this)">전체</button>';
  dates.slice(0,16).forEach(function(d){h+='<button class="s-chip" onclick="setDate(\''+d+'\',this)">'+d.slice(5).replace('-','/')+'</button>';});
  document.getElementById('dateChips').innerHTML=h;
}
function setDate(val,btn){S.date=val;document.querySelectorAll('.s-chip').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');render();}

/* CARRIER FILTER */
function buildCarrierFilter(){
  var seen={};ALL.forEach(function(a){if(a.carrier)seen[a.carrier]=true;});
  var h='<option value="all">전체</option>';
  Object.keys(seen).sort().forEach(function(c){h+='<option value="'+e(c)+'">'+e(c)+'</option>';});
  document.getElementById('carrierSel').innerHTML=h;
}

/* FILTER */
function filtered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var r=ALL.filter(function(a){
    if(S.region==='bookmarks')return BM.indexOf(a.id)!==-1;
    var rOk=S.region==='all'||S.region==='archive'||a.region===S.region;
    var tOk=S.topic==='all'||(a.tags||[]).indexOf(S.topic)!==-1;
    var cOk=S.carrier==='all'||a.carrier===S.carrier;
    var dOk=S.date==='all'||a.date===S.date;
    var sOk=!q||(a.title+' '+a.summary).toLowerCase().indexOf(q)!==-1;
    return rOk&&tOk&&cOk&&dOk&&sOk;
  });
  if(S.sort)r=r.slice().sort(function(a,b){return b.importance-a.importance;});
  return r;
}

/* RENDER */
function render(){
  var arts=filtered();
  var feed=document.getElementById('feedList');
  if(!arts.length){feed.innerHTML='<div style="padding:40px 0;text-align:center;font-size:13px;color:var(--text-3);">'+(S.region==='bookmarks'?'저장된 북마크가 없어요.':'기사가 없습니다.')+'</div>';return;}
  var grouped=S.region==='all'&&S.topic==='all'&&S.carrier==='all'&&S.date==='all'&&!S.sort&&!(document.getElementById('searchInput').value||'').trim();
  var html='';
  if(grouped){
    var dom=arts.filter(function(a){return a.region==='domestic';});
    var ovr=arts.filter(function(a){return a.region==='overseas';});
    if(dom.length){html+='<div class="sec-label">국내</div>';dom.forEach(function(a){html+=row(a);});}
    if(ovr.length){
      html+='<div class="sec-label" style="margin-top:12px;">해외</div>';
      ['us','jp','eu','cn'].forEach(function(cc){
        var sub=ovr.filter(function(a){return a.country===cc;});if(!sub.length)return;
        var cm=CM[cc];html+='<div class="sub-label">'+cm.flag+' '+cm.label+'</div>';
        sub.forEach(function(a){html+=row(a);});
      });
    }
  } else {
    arts.forEach(function(a){html+=row(a);});
  }
  feed.innerHTML=html;
}

function row(a){
  var cm=CM[a.country]||CM.domestic;
  var imp=a.importance||3;
  var ac=imp>=5?'#2B1EDE':imp>=4?'#6B62F0':imp>=3?'#B0AADE':'#D8D8D8';
  var stars='';for(var i=1;i<=5;i++)stars+='<span style="color:'+(i<=imp?ac:'#D8D8D8')+'">★</span>';
  var tags=(a.tags||[]).slice(0,2).map(function(t){return '<span class="tag t-topic">'+e(t)+'</span>';}).join('');
  var cr='<span class="tag '+cm.cls+'">'+cm.flag+' '+cm.label+(a.carrier?' · '+e(a.carrier):'')+' </span>';
  var sum=SUMMARY?'':'<div class="list-summary">'+e(a.summary)+'</div>';
  return '<div class="list-row" onclick="openModal(\''+a.id+'\')">'
    +'<div class="list-accent" style="background:'+ac+';height:'+(SUMMARY?'20':'38')+'px;"></div>'
    +'<div class="list-body"><div class="list-tags">'+tags+cr+'</div><div class="list-title">'+e(a.title)+'</div>'+sum+'</div>'
    +'<div class="list-right"><div class="list-stars">'+stars+'</div><div class="list-date">'+a.date.slice(5).replace('-','/')+'</div></div>'
    +'</div>';
}

/* STATE */
function setRegion(val,btn){
  S.region=val;
  document.querySelectorAll('.hdr-nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('heroWrap').style.display=(val==='all')?'':'none';
  render();
}
function setTopic(val,btn){
  S.topic=val;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');render();
}

/* LOAD */
fetch('data/articles.json')
  .then(function(r){return r.json();})
  .then(function(d){ALL=d.articles||[];renderHero(d);buildDateChips();buildCarrierFilter();render();})
  .catch(function(){document.getElementById('feedList').innerHTML='<div style="padding:40px 0;text-align:center;font-size:13px;color:var(--text-3);">데이터를 불러올 수 없습니다.</div>';});
</script>
</body>
</html>
