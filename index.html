<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통신산업 동향 모니터 — Telecom Watch</title>
<style>
  :root {
    --purple-900: #1A1145;
    --purple-800: #26215C;
    --purple-700: #3C3489;
    --purple-600: #534AB7;
    --purple-500: #7F77DD;
    --purple-300: #AFA9EC;
    --purple-200: #CECBF6;
    --purple-100: #EEEDFE;
    --blue-600: #185FA5;
    --blue-100: #E6F1FB;
    --gray-50: #F7F6F5;
    --gray-100: #EFEFED;
    --gray-200: #D3D1C7;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.1);
    --border-light: rgba(0,0,0,0.06);
    --bg: #F4F3F1;
    --surface: #FFFFFF;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.7; }

  /* ── HEADER ── */
  .site-header { background: var(--purple-700); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .site-logo { display: flex; align-items: center; gap: 10px; }
  .site-logo-icon { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
  .site-logo-icon svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
  .site-logo-text { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .site-logo-sub { color: var(--purple-300); font-size: 11px; letter-spacing: 0.05em; }
  .header-nav { display: flex; align-items: center; gap: 4px; }
  .nav-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-btn.active { background: rgba(255,255,255,0.18); color: #fff; }
  .summary-toggle { background: var(--purple-300); color: var(--purple-800); font-size: 12px; padding: 5px 14px; border-radius: 20px; cursor: pointer; border: none; font-family: inherit; font-weight: 500; transition: background 0.15s; }
  .summary-toggle:hover { background: var(--purple-200); }
  .summary-toggle.on { background: #fff; color: var(--purple-700); }

  /* ── MAIN 3-COLUMN LAYOUT ── */
  .main-wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    display: grid;
    grid-template-columns: 168px 1fr 256px;
    grid-template-rows: auto auto 1fr;
    gap: 0 16px;
  }

  /* ── LEFT NAV SIDEBAR ── */
  .left-nav {
    grid-column: 1;
    grid-row: 1 / 4;
    padding-top: 4px;
  }
  .left-nav-inner {
    position: sticky;
    top: 68px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 10px 10px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border: none;
    background: transparent;
    font-family: inherit;
    text-align: left;
    width: 100%;
  }
  .nav-item:hover { background: rgba(83,74,183,0.07); color: var(--purple-700); }
  .nav-item.active { background: var(--purple-100); color: var(--purple-700); font-weight: 500; border-left: 3px solid var(--purple-600); padding-left: 7px; }
  .nav-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .nav-divider { height: 0.5px; background: var(--border); margin: 4px 0; }
  .nav-count { margin-left: auto; font-size: 11px; color: var(--text-tertiary); font-weight: 400; }

  /* ── CENTER COLUMN ── */
  .center-col {
    grid-column: 2;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }

  /* ── TODAY BANNER ── */
  .today-banner { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; border-left: 4px solid var(--purple-600); }
  .banner-label { font-size: 10px; color: var(--purple-600); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .banner-headline { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.65; }
  .banner-date { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 0 0 200px; display: flex; align-items: center; gap: 7px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 6px 13px; }
  .search-box svg { width: 13px; height: 13px; stroke: var(--text-tertiary); flex-shrink: 0; fill: none; }
  .search-box input { border: none; outline: none; font-size: 12px; color: var(--text-primary); background: transparent; font-family: inherit; width: 100%; }
  .search-box input::placeholder { color: var(--text-tertiary); }
  .filter-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; }
  .filter-chip:hover { border-color: var(--purple-500); color: var(--purple-600); }
  .filter-chip.active { background: var(--purple-100); border-color: var(--purple-500); color: var(--purple-700); font-weight: 500; }
  .filter-sep { width: 0.5px; height: 16px; background: var(--border); margin: 0 2px; }

  /* ── ARTICLE FEED ── */
  .feed { display: flex; flex-direction: column; gap: 10px; }

  /* ── SECTION DIVIDER ── */
  .section-head { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .section-head-line { flex: 1; height: 0.5px; background: var(--border); }
  .section-head-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.09em; text-transform: uppercase; white-space: nowrap; }

  /* ── ARTICLE CARD ── */
  .article-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px 10px; transition: border-color 0.15s; }
  .article-card:hover { border-color: #7F77DD; }
  .card-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .tag-topic { background: var(--purple-100); color: var(--purple-700); }
  .tag-domestic { background: #F0FDF4; color: #166534; }
  .tag-us { background: #EFF6FF; color: #1D4ED8; }
  .tag-jp { background: #FFF7ED; color: #9A3412; }
  .tag-eu { background: #F0F4FF; color: #3730A3; }
  .tag-cn { background: #FEF2F2; color: #991B1B; }
  .importance { display: flex; gap: 1px; margin-left: auto; }
  .star.filled { color: var(--purple-500); font-size: 11px; }
  .star.empty { color: var(--gray-200); font-size: 11px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 5px; line-height: 1.55; }
  .card-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; }
  .card-date { font-size: 11px; color: var(--text-tertiary); }

  /* ── SHARE BUTTONS ── */
  .share-btns { display: flex; gap: 5px; align-items: center; }
  .share-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 12px;
    font-size: 11px; font-family: inherit;
    cursor: pointer; border: 0.5px solid var(--border);
    background: transparent; transition: all 0.12s;
    color: var(--text-tertiary);
  }
  .share-btn:hover { background: var(--gray-100); color: var(--text-secondary); }
  .share-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .share-btn.kakao:hover { background: #FEE500; color: #3A1D1D; border-color: #E6CF00; }
  .share-btn.telegram:hover { background: #E8F4FD; color: #0088CC; border-color: #9ECFEC; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--purple-800); color: #fff; font-size: 12px;
    padding: 9px 18px; border-radius: 20px; z-index: 999;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RIGHT SIDEBAR ── */
  .sidebar {
    grid-column: 3;
    grid-row: 1 / 4;
    padding-top: 4px;
  }
  .sidebar-inner {
    position: sticky;
    top: 68px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .side-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
  .side-panel-title { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border-light); font-size: 12px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
  .stat-count { font-weight: 500; color: var(--purple-700); }
  .carrier-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; border-bottom: 0.5px solid var(--border-light); }
  .carrier-item:last-child { border-bottom: none; }
  .carrier-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple-500); flex-shrink: 0; }
  .carrier-country { color: var(--text-tertiary); margin-left: auto; font-size: 11px; }
  .archive-dates { display: flex; flex-wrap: wrap; gap: 5px; }
  .date-chip { background: var(--gray-100); border-radius: var(--radius-sm); padding: 4px 9px; font-size: 11px; color: var(--text-secondary); cursor: pointer; border: 0.5px solid transparent; transition: all 0.12s; font-family: inherit; }
  .date-chip:hover { border-color: var(--purple-400, #7F77DD); color: var(--purple-700); }
  .date-chip.active { background: var(--purple-100); color: var(--purple-700); border-color: var(--purple-300); font-weight: 500; }

  /* ── SUMMARY MODE ── */
  body.summary-mode .card-summary { display: none; }
  body.summary-mode .article-card { padding-bottom: 10px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .main-wrap { grid-template-columns: 1fr 220px; }
    .left-nav { display: none; }
    .center-col { grid-column: 1; }
    .sidebar { grid-column: 2; }
  }
  @media (max-width: 600px) {
    .main-wrap { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .center-col { grid-column: 1; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<header class="site-header">
  <div class="site-logo">
    <div class="site-logo-icon">
      <svg viewBox="0 0 16 16"><polyline points="1,11 4,7 7,9 10,5 13,7 15,4"/></svg>
    </div>
    <div>
      <div class="site-logo-text">Telecom Watch</div>
      <div class="site-logo-sub">통신산업 동향 모니터</div>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="setRegionTab('all', this)">전체</button>
    <button class="nav-btn" onclick="setRegionTab('domestic', this)">국내</button>
    <button class="nav-btn" onclick="setRegionTab('overseas', this)">해외</button>
    <button class="nav-btn" onclick="setRegionTab('archive', this)">아카이브</button>
    <button class="summary-toggle" onclick="toggleSummary(this)">요약 모드</button>
  </nav>
</header>

<main class="main-wrap">

  <!-- ── LEFT NAV ── -->
  <nav class="left-nav" aria-label="주제 및 국가 필터">
    <div class="left-nav-inner">
      <div class="nav-section-label">주제</div>
      <button class="nav-item active" onclick="setTopic('all', this)">
        <span class="nav-item-dot" style="background:var(--purple-400,#7F77DD);"></span>
        전체
        <span class="nav-count">14</span>
      </button>
      <button class="nav-item" onclick="setTopic('요금·요금제', this)">
        <span class="nav-item-dot" style="background:#534AB7;"></span>
        요금 · 요금제
        <span class="nav-count">4</span>
      </button>
      <button class="nav-item" onclick="setTopic('최적요금제', this)">
        <span class="nav-item-dot" style="background:#7F77DD;"></span>
        최적요금제
        <span class="nav-count">3</span>
      </button>
      <button class="nav-item" onclick="setTopic('리텐션', this)">
        <span class="nav-item-dot" style="background:#AFA9EC;"></span>
        리텐션
        <span class="nav-count">3</span>
      </button>
      <button class="nav-item" onclick="setTopic('결합상품', this)">
        <span class="nav-item-dot" style="background:#185FA5;"></span>
        결합상품
        <span class="nav-count">3</span>
      </button>
      <button class="nav-item" onclick="setTopic('이용약관', this)">
        <span class="nav-item-dot" style="background:#3730A3;"></span>
        이용약관
        <span class="nav-count">2</span>
      </button>
      <button class="nav-item" onclick="setTopic('안면인증', this)">
        <span class="nav-item-dot" style="background:#9A3412;"></span>
        안면인증
        <span class="nav-count">3</span>
      </button>

      <div class="nav-divider"></div>
      <div class="nav-section-label">국가</div>
      <button class="nav-item" onclick="setCountry('all', this)" id="countryAll" style="font-weight:500; color:var(--text-primary);">
        전체
      </button>
      <button class="nav-item" onclick="setCountry('domestic', this)">
        🇰🇷 국내
        <span class="nav-count">6</span>
      </button>
      <button class="nav-item" onclick="setCountry('us', this)">
        🇺🇸 미국
        <span class="nav-count">3</span>
      </button>
      <button class="nav-item" onclick="setCountry('jp', this)">
        🇯🇵 일본
        <span class="nav-count">2</span>
      </button>
      <button class="nav-item" onclick="setCountry('eu', this)">
        🇪🇺 유럽
        <span class="nav-count">3</span>
      </button>
      <button class="nav-item" onclick="setCountry('cn', this)">
        🇨🇳 중국
        <span class="nav-count">1</span>
      </button>
    </div>
  </nav>

  <!-- ── CENTER COLUMN ── -->
  <div class="center-col">

    <!-- TODAY BANNER -->
    <div class="today-banner">
      <div class="banner-label" id="bannerLabel">로딩 중...</div>
      <div class="banner-headline" id="bannerHeadline">데이터를 불러오는 중입니다.</div>
      <div class="banner-date" id="bannerDate"></div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="search-box">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
        <input type="text" placeholder="키워드 검색..." id="searchInput" oninput="filterCards()">
      </div>
      <div class="filter-sep"></div>
      <button class="filter-chip active" onclick="setChipFilter('all', this)">전체</button>
      <button class="filter-chip" onclick="setChipFilter('요금제', this)"># 요금제</button>
      <button class="filter-chip" onclick="setChipFilter('최적요금제', this)"># 최적요금제</button>
      <button class="filter-chip" onclick="setChipFilter('리텐션', this)"># 리텐션</button>
      <button class="filter-chip" onclick="setChipFilter('결합상품', this)"># 결합상품</button>
      <button class="filter-chip" onclick="setChipFilter('이용약관', this)"># 이용약관</button>
      <button class="filter-chip" onclick="setChipFilter('안면인증', this)"># 안면인증</button>
    </div>

    <!-- FEED — JS로 동적 렌더링 -->
    <div class="feed" id="mainFeed">
      <div style="padding:40px 0; text-align:center; color:var(--text-tertiary); font-size:13px;">데이터 로딩 중...</div>
        </div><!-- /feed -->
  </div><!-- /center-col -->

  <!-- ── RIGHT SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="side-panel">
        <div class="side-panel-title">오늘 수집 현황</div>
        <div id="statCountry"></div>
      </div>

      <div class="side-panel">
        <div class="side-panel-title">주제별 현황</div>
        <div id="statTopic" style="display:flex; flex-direction:column; gap:7px;"></div>
      </div>

      <div class="side-panel">
        <div class="side-panel-title">통신사별</div>
        <div class="carrier-item"><span class="carrier-dot"></span><span>SKT</span><span class="carrier-country">국내</span></div>
        <div class="carrier-item"><span class="carrier-dot"></span><span>KT</span><span class="carrier-country">국내</span></div>
        <div class="carrier-item"><span class="carrier-dot"></span><span>LG U+</span><span class="carrier-country">국내</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#1D4ED8;"></span><span>T-Mobile</span><span class="carrier-country">미국</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#1D4ED8;"></span><span>AT&amp;T</span><span class="carrier-country">미국</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#1D4ED8;"></span><span>Verizon</span><span class="carrier-country">미국</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#9A3412;"></span><span>NTT Docomo</span><span class="carrier-country">일본</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#9A3412;"></span><span>SoftBank</span><span class="carrier-country">일본</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#3730A3;"></span><span>Vodafone</span><span class="carrier-country">유럽</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#3730A3;"></span><span>Deutsche Telekom</span><span class="carrier-country">유럽</span></div>
        <div class="carrier-item"><span class="carrier-dot" style="background:#991B1B;"></span><span>China Mobile</span><span class="carrier-country">중국</span></div>
      </div>

      <div class="side-panel">
        <div class="side-panel-title">날짜별 아카이브</div>
        <div class="archive-dates" id="archiveDates">
          <button class="date-chip active" onclick="setDate('all', this)">전체</button>
        </div>
      </div>
    </div>
  </aside>

</main>

<script>
/* ═══════════════════════════════════════════════════════
   Telecom Watch — 동적 렌더링 + 필터링 스크립트
   data/articles.json 을 fetch해 전체 UI를 동적으로 생성
═══════════════════════════════════════════════════════ */

var ALL_ARTICLES = [];
var state = { region: 'all', topic: 'all', country: 'all', chip: 'all', date: 'all' };

var TOPIC_MAP = {
  '요금·요금제': ['요금제'],
  '최적요금제':  ['최적요금제'],
  '리텐션':      ['리텐션'],
  '결합상품':    ['결합상품'],
  '이용약관':    ['이용약관'],
  '안면인증':    ['안면인증']
};

var COUNTRY_META = {
  domestic: { flag: '🇰🇷', label: '국내',  cls: 'tag-domestic', dotColor: 'var(--purple-500)' },
  us:       { flag: '🇺🇸', label: '미국',  cls: 'tag-us',       dotColor: '#1D4ED8' },
  jp:       { flag: '🇯🇵', label: '일본',  cls: 'tag-jp',       dotColor: '#9A3412' },
  eu:       { flag: '🇪🇺', label: '유럽',  cls: 'tag-eu',       dotColor: '#3730A3' },
  cn:       { flag: '🇨🇳', label: '중국',  cls: 'tag-cn',       dotColor: '#991B1B' },
};

var SHARE_SVG_KAKAO = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.82 1.7 5.3 4.27 6.8L5.2 21l4.26-2.22C10.26 19.05 11.12 19.1 12 19.1c5.52 0 10-3.58 10-8.05S17.52 3 12 3z"/></svg>';
var SHARE_SVG_TG    = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.92c-.12.56-.46.7-.93.44l-2.58-1.9-1.25 1.2c-.14.14-.26.26-.53.26l.19-2.64 4.82-4.36c.21-.19-.04-.3-.32-.11L7.54 14.6 5 13.8c-.56-.17-.57-.56.12-.83l8.97-3.46c.47-.17.88.11.72.83z"/></svg>';

/* ── 카드 HTML 생성 ─────────────────────────────────── */
function buildCard(a) {
  var cm = COUNTRY_META[a.country] || COUNTRY_META.domestic;
  var stars = '';
  for (var i = 1; i <= 5; i++) {
    stars += '<span class="star ' + (i <= a.importance ? 'filled' : 'empty') + '">★</span>';
  }
  var tags = (a.tags || []).map(function(t) {
    return '<span class="tag tag-topic">' + t + '</span>';
  }).join('');
  var regionTag = '<span class="tag ' + cm.cls + '">' + cm.flag + ' ' + cm.label + (a.carrier ? ' · ' + a.carrier : '') + '</span>';

  return '<div class="article-card"' +
    ' data-tags="' + (a.tags || []).join(',') + '"' +
    ' data-region="' + a.region + '"' +
    ' data-country="' + a.country + '"' +
    ' data-date="' + a.date + '">' +
    '<div class="card-meta">' + tags + regionTag +
    '<div class="importance">' + stars + '</div></div>' +
    '<div class="card-title">' + esc(a.title) + '</div>' +
    '<div class="card-summary">' + esc(a.summary) + '</div>' +
    '<div class="card-footer">' +
    '<span class="card-date">' + a.date + '</span>' +
    '<div class="share-btns">' +
    '<button class="share-btn kakao" onclick="shareKakao(this)">' + SHARE_SVG_KAKAO + ' 카카오톡</button>' +
    '<button class="share-btn telegram" onclick="shareTelegram(this)">' + SHARE_SVG_TG + ' 텔레그램</button>' +
    '</div></div></div>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 섹션 구분선 HTML ────────────────────────────────── */
function sectionHead(section, label, style) {
  return '<div class="section-head" data-section="' + section + '" style="' + (style||'') + '">' +
    '<span class="section-head-label" style="' + (label.style||'') + '">' + label.text + '</span>' +
    '<div class="section-head-line" style="' + (label.lineStyle||'') + '"></div></div>';
}

/* ── 피드 렌더링 ─────────────────────────────────────── */
function renderFeed(articles) {
  var feed = document.getElementById('mainFeed');
  if (!articles.length) {
    feed.innerHTML = '<div style="padding:40px 0;text-align:center;color:var(--text-tertiary);font-size:13px;">수집된 기사가 없습니다.</div>';
    return;
  }

  var domestic  = articles.filter(function(a){ return a.region === 'domestic'; });
  var overseas  = articles.filter(function(a){ return a.region === 'overseas'; });
  var countries = ['us','jp','eu','cn'];
  var html = '';

  if (domestic.length) {
    html += sectionHead('domestic', {text:'국내'});
    domestic.forEach(function(a){ html += buildCard(a); });
  }
  if (overseas.length) {
    html += sectionHead('overseas', {text:'해외'}, 'margin-top:6px;');
    countries.forEach(function(cc) {
      var cm  = COUNTRY_META[cc];
      var sub = overseas.filter(function(a){ return a.country === cc; });
      if (!sub.length) return;
      html += sectionHead('overseas',
        {text: cm.flag + ' ' + cm.label, style:'font-size:10px;color:' + cm.dotColor,
         lineStyle:'background:'+cm.dotColor+'22'},
        'margin-top:4px;');
      sub.forEach(function(a){ html += buildCard(a); });
    });
  }
  feed.innerHTML = html;
}

/* ── 사이드바 통계 렌더링 ───────────────────────────── */
function renderStats(articles) {
  /* 국가별 */
  var countryOrder = [
    ['domestic','🇰🇷 국내'], ['us','🇺🇸 미국'], ['jp','🇯🇵 일본'],
    ['eu','🇪🇺 유럽'], ['cn','🇨🇳 중국']
  ];
  var total = articles.length;
  var cHtml = '';
  countryOrder.forEach(function(pair) {
    var cnt = articles.filter(function(a){ return a.country === pair[0]; }).length;
    if (!cnt) return;
    cHtml += '<div class="stat-row"><span class="stat-label">' + pair[1] + '</span><span class="stat-count">' + cnt + '건</span></div>';
  });
  cHtml += '<div class="stat-row" style="margin-top:6px;padding-top:8px;border-top:0.5px solid var(--border);">' +
    '<span class="stat-label" style="font-weight:500;">총 수집</span>' +
    '<span class="stat-count" style="font-size:15px;">' + total + '건</span></div>';
  document.getElementById('statCountry').innerHTML = cHtml;

  /* 주제별 */
  var TAGS = ['요금제','최적요금제','리텐션','결합상품','이용약관','안면인증'];
  var maxCnt = 1;
  var tagCounts = {};
  TAGS.forEach(function(t) {
    tagCounts[t] = articles.filter(function(a){ return (a.tags||[]).indexOf(t) !== -1; }).length;
    if (tagCounts[t] > maxCnt) maxCnt = tagCounts[t];
  });
  var tHtml = '';
  TAGS.forEach(function(t) {
    var cnt = tagCounts[t];
    var pct = Math.round((cnt / maxCnt) * 100);
    tHtml += '<div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:3px;">' +
      '<span>' + t + '</span><span style="color:var(--text-tertiary);">' + cnt + '</span></div>' +
      '<div style="background:var(--gray-100);border-radius:2px;height:4px;">' +
      '<div style="width:' + pct + '%;height:4px;background:var(--purple-600);border-radius:2px;"></div></div></div>';
  });
  document.getElementById('statTopic').innerHTML = tHtml;

  /* 날짜 아카이브 */
  var dates = [];
  var seen = {};
  articles.forEach(function(a) {
    if (a.date && !seen[a.date]) { seen[a.date] = true; dates.push(a.date); }
  });
  dates.sort().reverse();
  var aHtml = '<button class="date-chip active" onclick="setDate(\'all\',this)">전체</button>';
  dates.slice(0, 20).forEach(function(d) {
    var label = d.slice(5).replace('-','/');
    aHtml += '<button class="date-chip" onclick="setDate(\'' + d + '\',this)">' + label + '</button>';
  });
  document.getElementById('archiveDates').innerHTML = aHtml;

  /* 왼쪽 네비 카운트 업데이트 */
  document.querySelectorAll('.nav-count[data-tag]').forEach(function(el) {
    var tag = el.getAttribute('data-tag');
    el.textContent = tagCounts[tag] || 0;
  });
}

/* ── 배너 렌더링 ─────────────────────────────────────── */
function renderBanner(data) {
  var today = new Date().toISOString().slice(0,10);
  var todayArticles = ALL_ARTICLES.filter(function(a){ return a.date === today; });
  var top5 = (todayArticles.length ? todayArticles : ALL_ARTICLES.slice(0,5))
    .sort(function(a,b){ return b.importance - a.importance; })
    .slice(0,5);
  var updatedAt = data.updated ? data.updated.slice(0,16).replace('T',' ') : '';
  var dateLabel = todayArticles.length ? today : (ALL_ARTICLES[0] ? ALL_ARTICLES[0].date : '');
  var dom = todayArticles.filter(function(a){ return a.region==='domestic'; }).length;
  var ovr = todayArticles.filter(function(a){ return a.region==='overseas'; }).length;

  document.getElementById('bannerLabel').textContent = '오늘의 주요 이슈 — ' + dateLabel.replace(/-/g,'년 ').replace(/-/,'월 ') + '일';
  document.getElementById('bannerHeadline').innerHTML = top5.map(function(a){ return esc(a.title); }).join(' &nbsp;·&nbsp; ');
  document.getElementById('bannerDate').textContent =
    '수집 시각 ' + (updatedAt.slice(11) || '--:--') +
    ' | 오늘 총 ' + todayArticles.length + '건 수집' +
    (todayArticles.length ? ' | 국내 ' + dom + '건 · 해외 ' + ovr + '건' : '');
}

/* ── 필터링 ──────────────────────────────────────────── */
function filterCards() {
  var search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var TOPIC_TAGS = TOPIC_MAP[state.topic] || [];

  document.querySelectorAll('.article-card').forEach(function(card) {
    var tags    = card.getAttribute('data-tags') || '';
    var region  = card.getAttribute('data-region') || '';
    var country = card.getAttribute('data-country') || '';
    var date    = card.getAttribute('data-date') || '';
    var text    = card.textContent.toLowerCase();

    var regionOk  = state.region === 'all' || state.region === 'archive' || region === state.region;
    var topicOk   = state.topic === 'all' || TOPIC_TAGS.some(function(t){ return tags.indexOf(t) !== -1; });
    var countryOk = state.country === 'all' || country === state.country ||
                    (state.country === 'domestic' && region === 'domestic');
    var chipOk    = state.chip === 'all' || tags.indexOf(state.chip) !== -1;
    var dateOk    = state.date === 'all' || date === state.date;
    var searchOk  = !search || text.indexOf(search) !== -1;

    card.style.display = (regionOk && topicOk && countryOk && chipOk && dateOk && searchOk) ? '' : 'none';
  });

  document.querySelectorAll('.section-head[data-section]').forEach(function(h) {
    var sec = h.getAttribute('data-section');
    var regionOk = state.region === 'all' || state.region === 'archive' || sec === state.region;
    h.style.display = regionOk ? '' : 'none';
  });
}

/* ── 상태 변경 함수들 ────────────────────────────────── */
function setRegionTab(val, btn) {
  state.region = val;
  document.querySelectorAll('.header-nav .nav-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterCards();
}
function setTopic(val, btn) {
  state.topic = val;
  document.querySelectorAll('.left-nav .nav-item').forEach(function(b){
    if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf('setTopic') !== -1) b.classList.remove('active');
  });
  btn.classList.add('active');
  filterCards();
}
function setCountry(val, btn) {
  state.country = val;
  document.querySelectorAll('.left-nav .nav-item').forEach(function(b){
    if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf('setCountry') !== -1) b.classList.remove('active');
  });
  btn.classList.add('active');
  filterCards();
}
function setChipFilter(val, btn) {
  state.chip = val;
  document.querySelectorAll('.filter-chip').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterCards();
}
function setDate(val, btn) {
  state.date = val;
  document.querySelectorAll('.date-chip').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterCards();
}

/* ── 공유 ────────────────────────────────────────────── */
function getCardInfo(btn) {
  var card = btn.closest('.article-card');
  return {
    title:   (card.querySelector('.card-title') || {}).textContent || '',
    summary: (card.querySelector('.card-summary') || {}).textContent || '',
    date:    (card.querySelector('.card-date') || {}).textContent || ''
  };
}
function shareKakao(btn) {
  var info = getCardInfo(btn);
  var text = '[Telecom Watch] ' + info.title + '\n\n' + info.summary + '\n\n(' + info.date + ')';
  if (navigator.share) {
    navigator.share({ title: info.title, text: text }).catch(function(){});
  } else {
    navigator.clipboard.writeText(text)
      .then(function(){ showToast('클립보드에 복사했어요. 카카오톡에 붙여넣기 해주세요.'); })
      .catch(function(){ showToast('복사 실패 — 직접 선택 후 복사해 주세요.'); });
  }
}
function shareTelegram(btn) {
  var info = getCardInfo(btn);
  var text = '[Telecom Watch] ' + info.title + '\n' + info.summary;
  window.open('https://t.me/share/url?url=' + encodeURIComponent(window.location.href) +
    '&text=' + encodeURIComponent(text), '_blank', 'noopener,width=600,height=500');
}

/* ── 토스트 ──────────────────────────────────────────── */
var _toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

/* ── 요약 모드 ───────────────────────────────────────── */
function toggleSummary(btn) {
  document.body.classList.toggle('summary-mode');
  btn.classList.toggle('on');
  btn.textContent = document.body.classList.contains('summary-mode') ? '전체 보기' : '요약 모드';
}

/* ── 초기 데이터 로드 ────────────────────────────────── */
fetch('data/articles.json')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    ALL_ARTICLES = data.articles || [];
    renderBanner(data);
    renderFeed(ALL_ARTICLES);
    renderStats(ALL_ARTICLES);
  })
  .catch(function(e) {
    console.error('데이터 로드 실패:', e);
    document.getElementById('mainFeed').innerHTML =
      '<div style="padding:40px 0;text-align:center;color:var(--text-tertiary);font-size:13px;">' +
      '데이터를 불러올 수 없습니다. 페이지를 새로고침 해주세요.</div>';
  });
</script>
